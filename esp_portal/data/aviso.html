<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviso de Segurança</title>
    <style>
        body {
            font-family: sans-serif;
            background: #1a1a1a;
            color: #f2f2f2;
            text-align: center;
            padding: 50px;
            max-width: 800px;
            margin: auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .alert {
            background: linear-gradient(135deg, #ff4444, #cc0000);
            padding: 40px;
            border-radius: 15px;
            font-size: 1.2em;
            box-shadow: 0 8px 32px rgba(255, 68, 68, 0.3);
            border: 2px solid #ff6666;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0% { box-shadow: 0 8px 32px rgba(255, 68, 68, 0.3); }
            50% { box-shadow: 0 8px 32px rgba(255, 68, 68, 0.6); }
            100% { box-shadow: 0 8px 32px rgba(255, 68, 68, 0.3); }
        }
        
        .alert h1 {
            margin-bottom: 20px;
            font-size: 2em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        
        .alert p {
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .alert strong {
            color: #ffff99;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }
        
        a {
            display: inline-block;
            margin-top: 30px;
            color: #00ccff;
            text-decoration: none;
            font-size: 1.1em;
            padding: 12px 24px;
            border: 2px solid #00ccff;
            border-radius: 8px;
            transition: all 0.3s ease;
            background: rgba(0, 204, 255, 0.1);
        }
        
        a:hover {
            background: #00ccff;
            color: #1a1a1a;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0, 204, 255, 0.4);
        }
        
        .warning-icon {
            font-size: 3em;
            margin-bottom: 20px;
            animation: shake 1s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .back-link {
            margin-top: 20px;
            font-size: 0.9em;
        }
        
        .back-link a {
            color: #888;
            border-color: #888;
            background: rgba(136, 136, 136, 0.1);
            padding: 8px 16px;
            font-size: 0.9em;
        }
        
        .back-link a:hover {
            background: #888;
            color: #1a1a1a;
        }
    </style>
</head>
<body>
    <div class="warning-icon">⚠️</div>
    <div class="alert">
        <h1>Aviso de Segurança</h1>
        <p>Você se conectou a uma rede Wi-Fi <strong>insegura</strong>.</p>
        <p>Em uma rede real, seus dados poderiam ser <strong>interceptados</strong>.</p>
        <p>Desconecte-se se não confiar nesta rede.</p>
        <p><strong>Esta é uma demonstração educativa sobre segurança em redes Wi-Fi.</strong></p>
    </div>
    
    <p><a href="/admin_panel">Ver painel administrativo</a></p>
    
    <div class="back-link">
        <a href="/">Voltar à página inicial</a>
    </div>
</body>
</html>
